<!DOCTYPE html>
<html>

<head>
    <title>Eligible Students</title>
</head>

<body>

<h1>Eligible Students</h1>

<table border="1" cellpadding="10">

<tr>
    <th>Student Name</th>
    <th>Branch</th>
    <th>CGPA</th>
    <th>Drive Name</th>
    <th>Status</th>
    <th>Action</th>
</tr>

{% for student in students %}

<tr>

    <td>{{ student[0] }}</td>

    <td>{{ student[1] }}</td>

    <td>{{ student[2] }}</td>

    <td>{{ student[3] }}</td>

    <td>{{ student[4] }}</td>

    <td>

        <a href="/aptitude-clear/{{ student[5] }}">
            <button>
                Aptitude Cleared
            </button>
        </a>

    </td>

</tr>

{% endfor %}

</table>

<br><br>

<a href="/admin-dashboard">
    <button>
        Back to Admin Dashboard
    </button>
</a>

</body>

</html>
